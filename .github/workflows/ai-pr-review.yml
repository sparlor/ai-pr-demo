name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: us-east-1

      - name: Extract PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          echo "diff_size=$(wc -c < pr.diff)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install boto3 requests

      - name: Run AI PR review with Bedrock
        id: review
        run: |
          python scripts/review.py pr.diff > review_output.json 2>&1

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let reviewOutput = 'No review available';
            
            try {
              if (fs.existsSync('review_output.json')) {
                const output = fs.readFileSync('review_output.json', 'utf8').trim();
                // Extract just the review content (after the last ::set-output line)
                const lines = output.split('\n');
                let reviewStart = false;
                let reviewContent = [];
                
                for (let i = lines.length - 1; i >= 0; i--) {
                  if (lines[i].startsWith('::set-output name=review::')) {
                    reviewContent = lines.slice(i + 1);
                    break;
                  }
                  if (!lines[i].startsWith('DEBUG:') && !lines[i].startsWith('✅') && !lines[i].startsWith('Running')) {
                    reviewContent.unshift(lines[i]);
                  }
                }
                
                if (reviewContent.length > 0) {
                  reviewOutput = reviewContent.join('\n').trim();
                }
              }
            } catch (error) {
              console.error('Error reading review output:', error);
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reviewOutput
            })
